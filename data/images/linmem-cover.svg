<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">LinMem cover</title>
  <desc id="desc">Abstract linear memory cover for agent tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" rx="32" fill="url(#bg)"/>
  <g opacity="0.42" stroke="#93c5fd" stroke-width="2">
    <path d="M70 90H570"/>
    <path d="M70 155H570"/>
    <path d="M70 220H570"/>
    <path d="M70 285H570"/>
  </g>
  <g fill="none" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M102 286C168 176 220 176 284 246S407 335 535 112"/>
  </g>
  <g fill="#111827">
    <text x="70" y="82" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" font-weight="800">LinMem</text>
    <text x="72" y="336" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#4b5563">Linear models as memorizers for agents</text>
  </g>
</svg>
