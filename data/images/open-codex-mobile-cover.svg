<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Open Codex Mobile cover</title>
  <desc id="desc">A mobile agent tools cover with a phone and terminal prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" rx="32" fill="url(#bg)"/>
  <circle cx="515" cy="82" r="78" fill="#dbeafe" opacity="0.7"/>
  <circle cx="116" cy="318" r="96" fill="#dcfce7" opacity="0.55"/>
  <g transform="translate(238 54)">
    <rect x="0" y="0" width="164" height="292" rx="28" fill="#111827"/>
    <rect x="12" y="20" width="140" height="246" rx="18" fill="url(#screen)"/>
    <circle cx="82" cy="278" r="6" fill="#64748b"/>
    <path d="M48 58h68" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
    <path d="M43 104l22 22-22 22" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M82 148h43" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
    <path d="M44 194h74" stroke="#bfdbfe" stroke-width="7" stroke-linecap="round"/>
    <path d="M44 220h54" stroke="#bfdbfe" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round">
    <path d="M134 150c45-56 92-78 142-65"/>
    <path d="M405 278c54-8 94-36 118-83"/>
  </g>
  <g font-family="Avenir, Helvetica, Arial, sans-serif">
    <text x="58" y="82" font-size="31" font-weight="800" fill="#0f172a">Open Codex</text>
    <text x="58" y="118" font-size="31" font-weight="800" fill="#2563eb">Mobile</text>
    <text x="58" y="356" font-size="20" font-weight="700" fill="#334155">Phone-side control for agent workflows</text>
  </g>
