<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mobile-on-Mobile Agent Loop</title>
  <desc id="desc">A clean editorial cover with four numbered cards: phone Codex, desktop Codex, USB ADB, and same phone GUI.</desc>
  <rect width="1200" height="675" fill="#fafaf7"/>
  <rect x="58" y="50" width="1084" height="575" rx="28" fill="#ffffff" stroke="#ded6cc"/>

  <text x="100" y="114" fill="#8b2323" font-family="Outfit, Inter, sans-serif" font-size="18" font-weight="700" letter-spacing="4">LABS NOTE</text>
  <text x="100" y="178" fill="#1a1a1a" font-family="Newsreader, Georgia, serif" font-size="58" font-weight="500">Mobile-on-Mobile</text>
  <text x="100" y="238" fill="#1a1a1a" font-family="Newsreader, Georgia, serif" font-size="58" font-weight="500">Agent Loop</text>
  <text x="103" y="280" fill="#5a5a5a" font-family="Outfit, Inter, sans-serif" font-size="21" font-weight="300">Phone intent, desktop execution, same-phone GUI evidence.</text>

  <g font-family="Outfit, Inter, sans-serif">
    <g transform="translate(100 345)">
      <rect width="475" height="92" rx="16" fill="#fbfbf8" stroke="#d6cec4" stroke-width="2"/>
      <text x="30" y="56" fill="#8b2323" font-size="24" font-weight="800">01</text>
      <text x="92" y="42" fill="#1a1a1a" font-size="24" font-weight="700">Phone Codex</text>
      <text x="92" y="68" fill="#5a5a5a" font-size="15">The mobile session captures the user's intent.</text>
    </g>
    <g transform="translate(625 345)">
      <rect width="415" height="92" rx="16" fill="#fbfbf8" stroke="#d6cec4" stroke-width="2"/>
      <text x="30" y="56" fill="#8b2323" font-size="24" font-weight="800">02</text>
      <text x="92" y="42" fill="#1a1a1a" font-size="24" font-weight="700">Desktop Codex</text>
      <text x="92" y="68" fill="#5a5a5a" font-size="15">The local machine executes the task.</text>
    </g>
    <g transform="translate(100 470)">
      <rect width="475" height="92" rx="16" fill="#fbfbf8" stroke="#d6cec4" stroke-width="2"/>
      <text x="30" y="56" fill="#8b2323" font-size="24" font-weight="800">03</text>
      <text x="92" y="42" fill="#1a1a1a" font-size="24" font-weight="700">USB ADB</text>
      <text x="92" y="68" fill="#5a5a5a" font-size="15">ADB becomes the phone GUI control bridge.</text>
    </g>
    <g transform="translate(625 470)">
      <rect width="415" height="92" rx="16" fill="#fbfbf8" stroke="#d6cec4" stroke-width="2"/>
      <text x="30" y="56" fill="#8b2323" font-size="24" font-weight="800">04</text>
      <text x="92" y="42" fill="#1a1a1a" font-size="24" font-weight="700">Same Phone GUI</text>
      <text x="92" y="68" fill="#5a5a5a" font-size="15">The real app returns screenshot evidence.</text>
    </g>
  </g>

  <text x="100" y="590" fill="#5a5a5a" font-family="Outfit, Inter, sans-serif" font-size="18" font-weight="300">The phone is not only the remote control. In this loop, it is also the environment.</text>
</svg>
